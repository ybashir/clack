steps:
  # Pull previous image for cache (ignore failure on first build)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_IMAGE}:latest || true']

  # Build with cache
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from=${_IMAGE}:latest'
      - '-t=${_IMAGE}:${BUILD_ID}'
      - '-t=${_IMAGE}:latest'
      - '.'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_IMAGE}']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_IMAGE}:${BUILD_ID}'
      - '--region=${_REGION}'
      - '--add-cloudsql-instances=${_CLOUD_SQL}'
      - '--set-env-vars=DATABASE_URL=${_DATABASE_URL}'
      - '--set-env-vars=JWT_SECRET=${_JWT_SECRET}'
      - '--set-env-vars=GCS_BUCKET_NAME=${_GCS_BUCKET}'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-env-vars=RUN_SEED=${_RUN_SEED}'
      - '--set-env-vars=GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}'
      - '--set-env-vars=CORS_ORIGIN=${_CORS_ORIGIN}'
      - '--timeout=3600'
      - '--session-affinity'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--allow-unauthenticated'

  # Ensure traffic routes to the new revision
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - '${_SERVICE}'
      - '--to-latest'
      - '--region=${_REGION}'

substitutions:
  _SERVICE: clack
  _REGION: us-central1
  _IMAGE: ''
  _CLOUD_SQL: ''
  _GCS_BUCKET: ''
  _RUN_SEED: 'false'
  _DATABASE_URL: ''
  _JWT_SECRET: ''
  _GOOGLE_CLIENT_ID: ''
  _CORS_ORIGIN: ''

options:
  logging: CLOUD_LOGGING_ONLY
